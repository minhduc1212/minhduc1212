name: Metrics

on:
  schedule: [{cron: "0 0 * * *"}] # Chạy vào 0h sáng mỗi ngày
  workflow_dispatch:               # Cho phép bấm chạy thủ công
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest   # FIX: @master không ổn định, dùng @latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # ── Cấu hình chung ──────────────────────────────────────────────
          user: minhduc1212
          template: classic
          base: header, community, repositories, metadata
          config_timezone: Asia/Ho_Chi_Minh

          # ── 1. Achievements ─────────────────────────────────────────────
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          # FIX: loại bỏ "projects" vì GitHub đã khai tử Projects (classic)
          plugin_achievements_ignored: >-
            octonaut

          # ── 2. Languages ─────────────────────────────────────────────────
          plugin_languages: yes
          plugin_languages_ignored: html, css, tex
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # ── 3. Habits ────────────────────────────────────────────────────
          plugin_habits: yes
          plugin_habits_from: 500   # FIX: tăng lên 500 để tránh lỗi khi dữ liệu thưa
          plugin_habits_days: 30    # FIX: mở rộng window lên 30 ngày
          plugin_habits_facts: yes

          # ── 4. Lines ─────────────────────────────────────────────────────
          plugin_lines: yes

          # ── 5. Activity ──────────────────────────────────────────────────
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 30  # FIX: mở rộng lên 30 để không trả về rỗng
          plugin_activity_filter: all

          # ── 6. Repositories ──────────────────────────────────────────────
          plugin_repositories: yes
          plugin_repositories_pinned: 4

          # ── REMOVED: Steam plugin ────────────────────────────────────────
          # plugin_steam_* đã bị xóa vì plugin_steam: yes chưa được bật
          # và không có STEAM_TOKEN → gây lỗi âm thầm.
          # Nếu muốn bật lại:
          #   plugin_steam: yes
          #   plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          #   plugin_steam_user: <your_steam_id>
          #   plugin_steam_sections: player, most-played, recently-played
          #   plugin_steam_games_limit: 3
